<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Interest Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h2>Simple Interest Calculator</h2>

        <label>Principal Amount (₹):</label>
        <input type="number" id="principal" placeholder="Enter Principal Amount">

        <label>Interest Rate (% per year):</label>
        <input type="number" id="rate" placeholder="Enter Interest Rate">

        <label>Time (Years):</label>
        <input type="number" id="time" placeholder="Enter Time">

        <button onclick="calculateSI()">Calculate</button>

        <div id="result"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
